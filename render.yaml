services:
  - type: web
    name: catalog-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: catalog-db
          property: connectionString
      - key: AI_PROVIDER
        value: local

databases:
  - name: catalog-db
    databaseName: catalog
    plan: free
